<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS Simulator — Login</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="glassmorphic-app">
  <div class="app-container">
    <!-- Left Sidebar -->
    <aside class="sidebar">
      <nav>
        <a href="#" class="nav-item active">
          <span class="icon">🏠</span>
          <span class="label">Dashboard</span>
        </a>
        <a href="#" class="nav-item">
          <span class="icon">🔑</span>
          <span class="label">Login</span>
        </a>
        <a href="#" class="nav-item">
          <span class="icon">⚙️</span>
          <span class="label">Settings</span>
        </a>
      </nav>
    </aside>

    <!-- Middle Panel -->
    <main class="main-panel">
      <h1 class="panel-title">Welcome to JS Simulator</h1>
      <div class="login-card">
        <h2>Login</h2>
        <form id="loginForm">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required />
          </div>
          <button type="submit" class="btn-primary">Sign In</button>
        </form>
        <p class="error-message" id="errorMessage"></p>
      </div>
    </main>

    <!-- Right Panel (Toolbar + Detail) -->
    <aside class="toolbar">
      <div class="toolbar-actions">
        <button class="btn-icon" title="Search"><span>🔍</span></button>
        <button class="btn-icon" title="Notifications"><span>🔔</span></button>
        <div class="avatar">👤</div>
      </div>
      <div class="detail-area">
        <h3>System Status</h3>
        <p>Ready to simulate.</p>
      </div>
    </aside>
  </div>

  <script src="./script.js"></script>
</body>
</html>
